name: Generate Fish
 
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # chạy tự động mỗi ngày lúc 00:00 UTC
 
permissions:
  contents: write
 
jobs:
  fish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Run Fish
        run: python scripts/fish.py
 
      - name: Verify output
        run: |
          echo "Nội dung thư mục dist:"
          ls -la dist/
 
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
